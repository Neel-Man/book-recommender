<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* --- Base Theme --- */
        body {
            /* A dark "gunmetal" gradient for the background */
            background: linear-gradient(145deg, #3a4149, #2c3137);
            background-attachment: fixed;
            color: #f0f0f0; /* Light text for readability */
        }

        /* --- Metallic Navbar --- */
        .navbar-metallic {
            /* A "brushed aluminum" gradient for the navbar */
            background: linear-gradient(to bottom, #4f5b66 0%, #3a454d 100%);
            border-bottom: 1px solid #5a6670;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .navbar-metallic .navbar-brand,
        .navbar-metallic .nav-link {
            color: #ffffff;
            font-weight: 500;
        }

        .navbar-metallic .nav-link:hover {
            color: #c0c0c0; /* Silver hover effect */
        }

        /* --- Page Title --- */
        .page-title {
            font-size: 3.5rem; /* Responsive font size */
            font-weight: 300; /* A thinner, more modern font weight */
            text-align: center;
            color: #e0e0e0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-top: 2rem;
            margin-bottom: 3rem;
        }

        /* --- Metallic Card Styling --- */
        .book-card {
            background: linear-gradient(145deg, #4e565f, #3a4149);
            border: 1px solid #555c63;
            border-radius: 8px;
            /* A complex shadow to give a 3D, "pressed metal" look */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), 
                        0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.3s ease;
            height: 100%; /* Makes all cards in a row the same height */
        }

        /* --- Card Hover Effect --- */
        .book-card:hover {
            transform: translateY(-8px);
            /* Brighter shadow and inset "sheen" on hover */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 
                        0 0 5px rgba(255, 255, 255, 0.2) inset;
        }

        .book-card .card-img-top {
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom: 1px solid #555c63;
            object-fit: cover; /* Ensures images fill the space nicely */
            height: 350px; /* Fixed height for uniformity */
        }

        .book-card .card-body {
            padding: 1.25rem;
        }

        .book-card .card-title {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            /* Ensures title doesn't overflow */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-card .card-text {
            color: #c0c0c0; /* Lighter silver color for secondary text */
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .book-card .card-text.stats {
            color: #a0a0a0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between; /* Spaces out Votes and Rating */
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-metallic">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Book Recommender</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/recommend">Recommend</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-12">
                <h1 class="page-title">Top 50 Books</h1>
            </div>
        </div>

        <div class="row">
            {% for i in range(book_name|length) %}
            <div class="col-lg-3 col-md-4 col-sm-6 mb-4 d-flex align-items-stretch">
                <div class="card book-card">
                    <img src="{{ image[i] }}" class="card-img-top" alt="{{ book_name[i] }}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" title="{{ book_name[i] }}">{{ book_name[i] }}</h5>
                        <p class="card-text">{{ author[i] }}</p>
                        
                        <div class="mt-auto"></div> 
                        
                        <div class="card-text stats">
                            <span>Votes: {{ votes[i] }}</span>
                            <span>Rating: {{ rating[i] }}</span>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
