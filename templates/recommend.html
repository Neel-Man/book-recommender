<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* --- Base Theme --- */
        body {
            /* A dark "gunmetal" gradient for the background */
            background: linear-gradient(145deg, #3a4149, #2c3137);
            background-attachment: fixed;
            color: #f0f0f0; /* Light text for readability */
        }

        /* --- Metallic Navbar --- */
        .navbar-metallic {
            /* A "brushed aluminum" gradient for the navbar */
            background: linear-gradient(to bottom, #4f5b66 0%, #3a454d 100%);
            border-bottom: 1px solid #5a6670;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .navbar-metallic .navbar-brand,
        .navbar-metallic .nav-link {
            color: #ffffff;
            font-weight: 500;
        }

        .navbar-metallic .nav-link:hover {
            color: #c0c0c0; /* Silver hover effect */
        }

        /* --- Page Title --- */
        .page-title {
            font-size: 3.5rem; /* Responsive font size */
            font-weight: 300; /* A thinner, more modern font weight */
            text-align: center;
            color: #e0e0e0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-top: 2rem;
            margin-bottom: 3rem;
        }

        /* --- Metallic Form Control --- */
        .form-control-metallic {
            background-color: #3f474f; /* Darker input background */
            border: 1px solid #555c63;
            color: #e0e0e0;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .form-control-metallic:focus {
            background-color: #4a525b;
            border-color: #708090; /* Slightly brighter border on focus */
            box-shadow: 0 0 0 0.25rem rgba(112, 128, 144, 0.25); /* Subtle focus glow */
            color: #ffffff;
        }

        /* --- Metallic Warning Button (Submit) --- */
        .btn-metallic-warning {
            /* A warm, gold-like metallic gradient */
            background: linear-gradient(to bottom, #d4af37 0%, #a88a2e 100%);
            border: 1px solid #c4a132;
            color: #2c3137; /* Dark text for contrast */
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .btn-metallic-warning:hover {
            background: linear-gradient(to bottom, #e0bb40 0%, #b29432 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
            border-color: #d4af37;
        }

        .btn-metallic-warning:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* --- Metallic Card Styling (Reused from Top Books) --- */
        .book-card {
            background: linear-gradient(145deg, #4e565f, #3a4149);
            border: 1px solid #555c63;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), 
                        0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.3s ease;
            height: 100%; /* Makes all cards in a row the same height */
        }

        /* --- Card Hover Effect --- */
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 
                        0 0 5px rgba(255, 255, 255, 0.2) inset;
        }

        .book-card .card-img-top {
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom: 1px solid #555c63;
            object-fit: cover;
            height: 350px; /* Fixed height for uniformity */
        }

        .book-card .card-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .book-card .card-title {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.5rem;
        }

        .book-card .card-text-author {
            color: #c0c0c0; /* Lighter silver color for author text */
            font-size: 0.95rem;
            margin-bottom: 0; /* Remove default margin */
            flex-grow: 1; /* Pushes content below to the bottom if needed */
        }
        
        /* --- Custom Alert Style for Errors --- */
        .alert-metallic-warning {
            color: #2c3137; 
            background-color: #d4af37; 
            border-color: #a88a2e;
            font-weight: 600;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-metallic">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Book Recommender</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/recommend">Recommend</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-12">
                <h1 class="page-title">Recommend Books</h1>
                <form action="/recommend_books" method="post" class="mb-5">
                    <div class="input-group mb-3">
                        <input name="user_input" type="text" class="form-control form-control-metallic" placeholder="Enter a book title..." aria-label="Book title" aria-describedby="button-addon2">
                        <button class="btn btn-metallic-warning" type="submit" id="button-addon2">Find Recommendations</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                {% if not_found_message %}
                    <div class="alert alert-metallic-warning mb-5" role="alert">
                        {{ not_found_message }}
                    </div>
                {% endif %}
            </div>
        </div>
        <div class="row">
            {% if data %}
                {% for i in data %}
                    <div class="col-lg-3 col-md-4 col-sm-6 mb-4 d-flex align-items-stretch">
                        <div class="card book-card">
                            <img src="{{i[2]}}" class="card-img-top" alt="{{i[0]}}">
                            <div class="card-body">
                                <h5 class="card-title" title="{{i[0]}}">{{i[0]}}</h5>
                                <p class="card-text card-text-author">{{i[1]}}</p>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
